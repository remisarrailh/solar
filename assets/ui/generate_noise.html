<!DOCTYPE html><html><body><canvas id="c" width="64" height="64"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d'),d=ctx.createImageData(64,64);
for(let i=0;i<d.data.length;i+=4){const v=Math.random()*255|0;d.data[i]=v;d.data[i+1]=v;d.data[i+2]=v;d.data[i+3]=255;}
ctx.putImageData(d,0,0);
const a=document.createElement('a');a.href=c.toDataURL();a.download='noise.png';document.body.appendChild(a);a.click();
</script></body></html>
